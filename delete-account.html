      display: flex;
      justify-content: center;
      gap: 6px;

      border-color: #fff;
      color: #1565C0;
      font-weight: 600;
    }

      max-width: 680px;
      margin: 36px auto;
      padding: 0 20px 60px;

      background: #fff;
      border-radius: 12px;
      padding: 36px 40px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1565C0;
      margin-bottom: 16px;
    }

    p { font-size: 0.95rem; color: #444; margin-bottom: 12px; }

    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      background: #1565C0;
      color: #fff;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 700;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .step {
      display: flex;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .step-text { font-size: 0.95rem; color: #444; padding-top: 2px; }

    .warning {
      background: #FFF3E0;
      border-left: 4px solid #FF9800;
      border-radius: 6px;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 0.9rem;
      color: #5D4037;
    }

    .contact {
      background: #E3F2FD;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 0.9rem;
      color: #1a1a1a;
    }

    a { color: #1565C0; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.82rem;
      color: #999;
    }

    @media (max-width: 600px) {
      section { padding: 24px 20px; }
      header h1 { font-size: 1.4rem; }

function setLang(lang) {
  const t = translations[lang];
  document.documentElement.lang = lang;
  document.getElementById("hdr-sub").textContent   = t.hdrSub;
  document.getElementById("s1-title").textContent  = t.s1Title;
  document.getElementById("s1-intro").textContent  = t.s1Intro;
  document.getElementById("step1").innerHTML       = t.step1;
  document.getElementById("step2").innerHTML       = t.step2;
  document.getElementById("step3").innerHTML       = t.step3;
  document.getElementById("step4").innerHTML       = t.step4;
  document.getElementById("warning").innerHTML     = t.warning;
  document.getElementById("s2-title").textContent  = t.s2Title;
  document.getElementById("d1").textContent        = t.d1;
  document.getElementById("d2").textContent        = t.d2;
  document.getElementById("d3").textContent        = t.d3;
  document.getElementById("d4").textContent        = t.d4;
  document.getElementById("d5").textContent        = t.d5;
  document.getElementById("retention").textContent = t.retention;
  document.getElementById("s3-title").textContent  = t.s3Title;
  document.getElementById("s3-intro").textContent  = t.s3Intro;
  document.getElementById("s3-note").textContent   = t.s3Note;
  document.getElementById("footer-link").textContent = t.footerLink;

  document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add("active");

  localStorage.setItem("lang", lang);
}

// Auto-detect lingua dal browser, fallback italiano
(function() {
  const saved = localStorage.getItem("lang");
  if (saved && translations[saved]) { setLang(saved); return; }
  const browser = (navigator.language || "it").slice(0, 2).toLowerCase();
  setLang(translations[browser] ? browser : "it");
})();
